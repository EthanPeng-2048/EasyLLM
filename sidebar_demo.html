<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>侧边栏UI示例</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* 侧边栏样式 - 从右侧滑出 */
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 300px;
            height: 100vh;
            background: #fff;
            box-shadow: -2px 0 8px rgba(0,0,0,0.1);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            font-weight: 600;
            font-size: 18px;
            color: #333;
        }

        .sidebar-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 对话记录列表区域 */
        .chat-list-section {
            flex: 1;
            overflow-y: auto;
            border-bottom: 1px solid #e0e0e0;
        }

        .section-title {
            padding: 12px 20px;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #fafafa;
        }

        .chat-item {
            padding: 14px 20px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: #f5f5f5;
        }

        .chat-item.active {
            background: #e3f2fd;
            border-left: 3px solid #1976d2;
        }

        .chat-item-title {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item-date {
            font-size: 12px;
            color: #999;
        }

        /* 设置区域 */
        .settings-section {
            padding: 12px 0;
        }

        .sidebar-item {
            padding: 14px 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar-item:hover {
            background: #f5f5f5;
        }

        .sidebar-item-title {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }

        .sidebar-item-desc {
            font-size: 12px;
            color: #888;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .chat-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* 底部状态栏 - 加大高度 */
        .bottom-bar {
            height: 56px;
            background: #fafafa;
            border-top: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .status-info {
            display: flex;
            gap: 24px;
            font-size: 13px;
            color: #666;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .material-symbols-rounded {
            font-size: 20px;
            color: #888;
        }

        /* 展开按钮 */
        .expand-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #1976d2;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(25, 118, 210, 0.3);
            transition: all 0.2s;
        }

        .expand-btn:hover {
            background: #1565c0;
            transform: scale(1.05);
        }

        .expand-btn .material-symbols-rounded {
            color: white;
            font-size: 26px;
        }

        /* 遮罩层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 99;
        }

        .overlay.show {
            opacity: 1;
            visibility: visible;
        }

        /* 输入区域 */
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #e0e0e0;
            background: #fff;
        }

        .input-box {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            font-family: inherit;
        }

        .input-field:focus {
            outline: none;
            border-color: #1976d2;
        }

        .send-btn {
            padding: 12px 20px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #1565c0;
        }

        /* 示例对话 */
        .message {
            margin-bottom: 20px;
            max-width: 80%;
        }

        .message.user {
            margin-left: auto;
        }

        .message.assistant {
            margin-right: auto;
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: #1976d2;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 遮罩层 -->
        <div class="overlay" id="overlay"></div>

        <!-- 侧边栏 - 从右侧滑出 -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">菜单</div>
            <div class="sidebar-content">
                <!-- 对话记录列表 -->
                <div class="chat-list-section">
                    <div class="section-title">对话记录</div>
                    <div class="chat-item active">
                        <div class="chat-item-title">关于Python装饰器的讨论</div>
                        <div class="chat-item-date">今天 14:30</div>
                    </div>
                    <div class="chat-item">
                        <div class="chat-item-title">JavaScript异步编程问题</div>
                        <div class="chat-item-date">昨天 21:15</div>
                    </div>
                    <div class="chat-item">
                        <div class="chat-item-title">React组件优化建议</div>
                        <div class="chat-item-date">3天前</div>
                    </div>
                    <div class="chat-item">
                        <div class="chat-item-title">数据库设计咨询</div>
                        <div class="chat-item-date">上周</div>
                    </div>
                </div>

                <!-- 设置区域 -->
                <div class="settings-section">
                    <div class="section-title" style="background: transparent; padding-top: 20px;">设置</div>
                    <div class="sidebar-item">
                        <div class="sidebar-item-title">MCP 设置</div>
                        <div class="sidebar-item-desc">配置模型上下文协议</div>
                    </div>
                    <div class="sidebar-item">
                        <div class="sidebar-item-title">API 设置</div>
                        <div class="sidebar-item-desc">配置API密钥和端点</div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="chat-area">
                <div class="message assistant">
                    <div class="message-content">
                        你好！有什么可以帮助你的吗？
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-box">
                    <textarea class="input-field" placeholder="输入消息..." rows="1"></textarea>
                    <button class="send-btn">发送</button>
                </div>
            </div>

            <!-- 底部状态栏 -->
            <div class="bottom-bar">
                <div class="status-info">
                    <div class="status-item">
                        <span class="material-symbols-rounded">smart_toy</span>
                        <span>GPT-4</span>
                    </div>
                    <div class="status-item">
                        <span class="material-symbols-rounded">data_array</span>
                        <span>Context: 2,340 tokens</span>
                    </div>
                </div>
                <button class="expand-btn" id="expandBtn" title="展开侧边栏">
                    <span class="material-symbols-rounded">menu</span>
                </button>
            </div>
        </main>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const expandBtn = document.getElementById('expandBtn');

        function toggleSidebar() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        expandBtn.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && sidebar.classList.contains('open')) {
                toggleSidebar();
            }
        });
    </script>
</body>
</html>
